name: "Model request"
description: "Request a model to be added to the ASE-Bench leaderboard"
title: "[model request] "
labels: ["model-request"]
body:
  - type: input
    id: model_id
    attributes:
      label: "OpenRouter model ID (or public API)"
      description: "Check availability at https://openrouter.ai/models — e.g. `vendor/model-name`. Models without live endpoints cannot be run."
      placeholder: "vendor/model-name"
    validations:
      required: true
  - type: input
    id: release
    attributes:
      label: "Release date (approx, YYYY-MM)"
      placeholder: "2026-05"
  - type: textarea
    id: why
    attributes:
      label: "Why this model?"
      description: "New vendor? New generation? Interesting size/architecture? One line is enough."
    validations:
      required: false
