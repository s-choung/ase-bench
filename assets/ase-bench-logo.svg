<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="ASE-Bench logo: a bench built from atoms and bonds">
  <defs>
    <linearGradient id="atom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- bonds: backrest, seat (2 segments), legs -->
  <g stroke="#94a3b8" stroke-width="7" stroke-linecap="round">
    <line x1="38" y1="20" x2="38" y2="62"/>
    <line x1="38" y1="62" x2="62" y2="62"/>
    <line x1="62" y1="62" x2="86" y2="62"/>
    <line x1="38" y1="62" x2="38" y2="102"/>
    <line x1="86" y1="62" x2="86" y2="102"/>
  </g>
  <!-- atoms: backrest top, joint, seat middle, seat front, feet -->
  <g fill="url(#atom)" stroke="#312e81" stroke-width="2.5">
    <circle cx="38" cy="18" r="11"/>
    <circle cx="38" cy="62" r="9"/>
    <circle cx="62" cy="62" r="9"/>
    <circle cx="86" cy="62" r="9"/>
    <circle cx="38" cy="103" r="7.5"/>
    <circle cx="86" cy="103" r="7.5"/>
  </g>
</svg>
